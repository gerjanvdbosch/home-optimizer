[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "home-optimizer"
version = "0.1.0"
description = "2-state thermal model, Kalman filter, and MPC for underfloor heating home optimization"
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "gerjanvdbosch" },
]
dependencies = [
  "numpy>=1.26,<3.0",
  "scipy>=1.11,<2.0",
  "cvxpy>=1.5,<2.0",
  "fastapi>=0.110",
  "uvicorn>=0.29",
  "plotly>=5.20",
  "httpx>=0.27",
  "scikit-learn>=1.5,<2.0",
  "SQLAlchemy>=2.0,<3.0",
  "APScheduler>=3.10,<4.0",
  "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
  "black>=24.0",
  "pyflakes>=3.2",
  "pyright>=1.1,<2.0",
  "pytest>=8.0",
  "ruff>=0.4",
]

[project.scripts]
home-optimizer-demo = "home_optimizer.__main__:main"
home-optimizer-addon = "home_optimizer.addon:main"
home-optimizer-local = "home_optimizer.local_runner:main"
home-optimizer-calibration = "home_optimizer.calibration.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
home_optimizer = ["templates/*.html"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests", "examples"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.ruff.lint.per-file-ignores]
"src/home_optimizer/api.py" = ["E501"]  # HTML template lines can't be wrapped

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pyright]
include = ["src", "tests"]
exclude = ["**/__pycache__"]
extraPaths = ["src"]
pythonVersion = "3.11"
typeCheckingMode = "standard"
reportMissingTypeStubs = false

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
