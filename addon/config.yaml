name: "Home Optimizer"
version: "0.8"
slug: "home-optimizer"
description: "A Home Assistant add-on that learns your home's thermal behavior and uses model predictive control to schedule your heat pump around solar production and electricity prices."
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
homeassistant_api: true
ingress: true
ingress_port: 8000
ingress_stream: true
panel_title: Optimizer
panel_icon: mdi:home-lightning-bolt-outline
options:
  climate:
    room_schedule:
      - { time: "00:00", target: 19.0, low_margin: 0.5, high_margin: 1.5 }
      - { time: "08:00", target: 19.0, low_margin: 0.5, high_margin: 1.5 }
      - { time: "14:00", target: 19.5, low_margin: 0.5, high_margin: 1.5 }
      - { time: "18:00", target: 20.0, low_margin: 0.5, high_margin: 1.5 }
      - { time: "22:00", target: 19.0, low_margin: 0.5, high_margin: 1.5 }
    dhw_schedule:
      - { time: "00:00", target: 20.0, low_margin: 5.0, high_margin: 30.0 }
      - { time: "19:59", target: 20.0, low_margin: 5.0, high_margin: 30.0 }
      - { time: "20:00", target: 50.0, low_margin: 2.0, high_margin: 5.0 }
      - { time: "21:00", target: 50.0, low_margin: 2.0, high_margin: 5.0 }
      - { time: "21:01", target: 20.0, low_margin: 5.0, high_margin: 30.0 }
  log_level: info
schema:
  climate:
    room_schedule:
      - time: str
        target: float
        low_margin: float
        high_margin: float
    dhw_schedule:
      - time: str
        target: float
        low_margin: float
        high_margin: float
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
ports:
  8000/tcp: 8000
map:
  - addon_config:rw
