---
name: "Home Optimizer"
description: >-
  Slimme warmtepompregeling met MPC en automatische kalibratie, gericht op 
  maximale zelfconsumptie van zonne-energie en minimale energiekosten.
version: "0.10"
slug: "home_optimizer"
url: "https://github.com/gerjanvandenbosch/home-optimizer"
init: false

panel_title: Optimizer
panel_icon: mdi:home-lightning-bolt-outline

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

homeassistant_api: true
ingress: true
ingress_port: 8099

ports:
  8099/tcp: 8099

ports_description:
  8099/tcp: "Home Optimizer"

map:
  - addon_config:rw

options:
  history_import_enabled: true
  history_import_max_days_back: 10
  history_import_chunk_days: 3

  # PV panel orientation (used by Open-Meteo GTI forecast for PV surface)
  # pv_azimuth: compass bearing — 0=North, 90=East, 180=South, 270=West
  # pv_tilt:    0=horizontal, 90=vertical wall
  pv_tilt: 50.0
  pv_azimuth: 148.0

  boiler_tank_liters: 200

  sensors:
    room_temperature: "sensor.danfoss_15_temperature"
    thermostat_setpoint: "sensor.danfoss_15_setpoint"
    outdoor_temperature: "sensor.ecodan_heatpump_ca09ec_buiten_temp"
    hp_supply_temperature: "sensor.ecodan_heatpump_ca09ec_aanvoer_temp"
    hp_supply_target_temperature: "sensor.warmtepomp_setpoint_waarde"
    hp_return_temperature: "sensor.ecodan_heatpump_ca09ec_retour_temp"
    dhw_top_temperature: "sensor.ecodan_heatpump_ca09ec_sww_2e_temp_sensor"
    dhw_bottom_temperature: "sensor.ecodan_heatpump_ca09ec_sww_huidige_temp"
    boiler_ambient_temperature: "sensor.ecodan_heatpump_ca09ec_zone_1_ruimte_temp"
    refrigerant_condensation_temperature: "sensor.ecodan_heatpump_ca09ec_koelmiddel_condensatie_temp"
    refrigerant_liquid_line_temperature: "sensor.ecodan_heatpump_ca09ec_buitenunit_vloeistofleiding_1"
    discharge_temperature: "sensor.ecodan_heatpump_ca09ec_ontladingstemperatuur"
    compressor_frequency: "sensor.ecodan_heatpump_compressor_frequentie"
    defrost_active: "binary_sensor.ecodan_heatpump_ca09ec_status_defrost"
    booster_heater_active: "binary_sensor.ecodan_heatpump_ca09ec_status_booster_heater"
    hp_flow: "sensor.ecodan_heatpump_ca09ec_flow_waarde"
    hp_mode: "sensor.warmtepomp_mode"
    pv_total_kwh: "sensor.pv_energie_totaal"
    hp_electric_total_kwh: "sensor.warmtepomp_verbruikt_gerapporteerd_totaal"
    p1_import_total_kwh: "sensor.p1_meter_energy_import"
    p1_export_total_kwh: "sensor.p1_meter_energy_export"
    # Power in Watts
    hp_electric_power: "sensor.warmtepomp_geschat_vermogen"
    p1_net_power: "sensor.p1_meter_power"
    pv_output_power: "sensor.pv_output"
    # Shutter position (0-100% closed)
    shutter_living_room: "sensor.woonkamer_rolluik"

  database_path: "/config/database.sqlite"
  api_port: 8099

schema:
  history_import_enabled: bool
  history_import_max_days_back: int
  history_import_chunk_days: int

  pv_tilt: float
  pv_azimuth: float

  boiler_tank_liters: int

  sensors:
    room_temperature: str
    thermostat_setpoint: str
    outdoor_temperature: str
    hp_supply_temperature: str
    hp_supply_target_temperature: str
    hp_return_temperature: str
    dhw_top_temperature: str
    dhw_bottom_temperature: str
    boiler_ambient_temperature: str
    refrigerant_condensation_temperature: str
    refrigerant_liquid_line_temperature: str
    discharge_temperature: str
    compressor_frequency: str
    defrost_active: str
    booster_heater_active: str
    hp_flow: str
    hp_mode: str
    pv_total_kwh: str
    hp_electric_total_kwh: str
    p1_import_total_kwh: str
    p1_export_total_kwh: str
    hp_electric_power: str
    p1_net_power: str
    pv_output_power: str
    shutter_living_room: str

  database_path: str
  api_port: int
