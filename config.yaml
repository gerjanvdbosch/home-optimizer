---
name: "Home Optimizer"
description: >-
  A Home Assistant add-on that learns your home's thermal behavior and uses 
  model predictive control to schedule your heat pump around solar 
  production and electricity prices.
version: "0.11"
slug: "home_optimizer"
url: "https://github.com/gerjanvandenbosch/home-optimizer"
init: false

panel_title: Optimizer
panel_icon: mdi:home-lightning-bolt-outline

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

homeassistant_api: true
ingress: true
ingress_port: 8899

ports:
  8099/tcp: 8899

ports_description:
  8099/tcp: "Home Optimizer"

map:
  - addon_config:rw

options:
  influx_host: "a0d7b954-influxdb"
  influx_port: 8086
  influx_username: ""
  influx_password: ""
  influx_database: "home_assistant"
  log_level: "INFO"

schema:
  influx_host: str
  influx_port: int
  influx_username: str
  influx_password: password
  influx_database: str
  log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)

