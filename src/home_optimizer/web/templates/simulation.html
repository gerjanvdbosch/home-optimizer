<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>$title</title>
    <link rel="stylesheet" href="static/shared.css" />
    <link rel="stylesheet" href="static/simulation.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar topbar-simple">
        <div class="title-group">
          <h1>$title</h1>
          <span>Modeltraining en vergelijking met metingen</span>
        </div>
        <nav class="page-nav" aria-label="Pagina navigatie">
          <a class="page-link" href="./">Dashboard</a>
          <a class="page-link is-active" href="simulation">Simulatie</a>
        </nav>
      </header>

      <section class="simulation-layout">
        <article class="panel prediction-panel">
          <div class="panel-heading">
            <h2>Scenario voorspelling vs gemeten</h2>
            <span id="prediction-summary">Vergelijk voorspelling met metingen</span>
          </div>
          <div class="comparison-stats" aria-label="Vergelijkingsstatistieken">
            <article class="comparison-stat">
              <span class="comparison-stat-label">Eind delta</span>
              <strong id="prediction-stat-delta">-</strong>
            </article>
            <article class="comparison-stat">
              <span class="comparison-stat-label">RMSE</span>
              <strong id="prediction-stat-rmse">-</strong>
            </article>
            <article class="comparison-stat">
              <span class="comparison-stat-label">Bias</span>
              <strong id="prediction-stat-bias">-</strong>
            </article>
            <article class="comparison-stat">
              <span class="comparison-stat-label">Max fout</span>
              <strong id="prediction-stat-max-error">-</strong>
            </article>
          </div>
          <form id="prediction-form" class="scenario-form">
            <label>
              Start
              <input id="prediction-start" type="datetime-local" required />
            </label>
            <label>
              Uren vooruit
              <input id="prediction-hours" type="number" min="1" max="48" step="1" value="24" required />
            </label>
            <fieldset class="scenario-fieldset">
              <legend>Setpoint bron</legend>
              <label class="radio-option">
                <input id="prediction-setpoint-source-measured" type="radio" name="prediction-setpoint-source" value="measured" checked />
                <span>Gemeten</span>
              </label>
              <label class="radio-option">
                <input id="prediction-setpoint-source-manual" type="radio" name="prediction-setpoint-source" value="manual" />
                <span>Handmatig</span>
              </label>
            </fieldset>
             <fieldset class="scenario-fieldset">
              <legend>Shutter bron</legend>
              <label class="radio-option">
                <input id="prediction-shutter-source-measured" type="radio" name="prediction-shutter-source" value="measured" checked />
                <span>Gemeten</span>
              </label>
              <label class="radio-option">
                <input id="prediction-shutter-source-manual" type="radio" name="prediction-shutter-source" value="manual" />
                <span>Handmatig</span>
              </label>
            </fieldset>
            <section id="prediction-setpoint-editor" class="block-editor" aria-label="Handmatige setpointblokken">
              <div class="block-editor-heading">
                <strong>Handmatige setpointblokken</strong>
                <button id="prediction-setpoint-add-block" type="button" class="secondary-button">Blok toevoegen</button>
              </div>
              <div id="prediction-setpoint-blocks" class="block-editor-list"></div>
            </section>

            <section id="prediction-shutter-editor" class="block-editor" aria-label="Handmatige shutterblokken">
              <div class="block-editor-heading">
                <strong>Handmatige shutterblokken</strong>
                <button id="prediction-shutter-add-block" type="button" class="secondary-button">Blok toevoegen</button>
              </div>
              <div id="prediction-shutter-blocks" class="block-editor-list"></div>
            </section>
            <div class="scenario-actions">
              <button id="prediction-button" type="submit">Vergelijk met metingen</button>
              <div id="prediction-status" class="status" aria-live="polite"></div>
            </div>
          </form>
          <div class="chart-wrap" id="prediction-chart"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>Model trainen</h2>
          </div>
          <div class="training-panel">
            <label>
              Trainingsstart
              <input id="training-start" type="datetime-local" required />
            </label>
            <label>
              Trainingseinde
              <input id="training-end" type="datetime-local" required />
            </label>
            <label>
              Interval (min)
              <input id="training-interval" type="number" min="1" step="1" value="15" required />
            </label>
            <label>
              Train fractie
              <input id="training-fraction" type="number" min="0.1" max="0.95" step="0.05" value="0.8" required />
            </label>
            <div class="scenario-actions">
              <button id="training-button" type="button">Train en sla model op</button>
              <div id="training-status" class="status" aria-live="polite"></div>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="plotly.js"></script>
    <script src="static/shared.js"></script>
    <script src="static/simulation.js"></script>
  </body>
</html>
